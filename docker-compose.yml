services:
  postgres:
    image: postgres:18
    container_name: user-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: userdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
  app:
    build: .
    container_name: user-app
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    environment:
      DB_URL: postgres://admin:admin@postgres:5432/userdb?sslmode=disable

volumes:
  postgres_data: