on:
  push:
    branches: [ "main" ]
  pull_request:
    
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26
      - name: Install dependencies
        run: RUN go mod download
      - name: Test with the Go CLI
        if: github.event_name == 'pull_request'
        run: go test ./...
      - name: Build
        if: ${{ github.event.issue.pull_request && github.event.issue_comment.body == 'run build' || github.event_name == 'push' && github.ref_name == 'main' }}
        run: go build -v ./...